main-db.driver-class-name=org.h2.Driver
main-db.jdbc-url=jdbc:h2:./db/memo-repo;AUTO_SERVER=TRUE
main-db.username=sa

job-db.driver-class-name=org.h2.Driver
job-db.jdbc-url=jdbc:h2:./db/job-repo;AUTO_SERVER=TRUE
job-db.username=sa

spring.sql.init.mode=always
spring.batch.jdbc.initialize-schema=always
spring.batch.jdbc.isolation-level-for-create=REPEATABLE_READ
spring.batch.job.enabled=false
